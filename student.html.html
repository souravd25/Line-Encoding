
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{padding:1.25rem 1rem}
.header{margin-bottom:1.25rem}
.header h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.header p{font-size:13px;color:var(--color-text-secondary)}
.input-row{display:flex;gap:10px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;font-size:15px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.input-row input:focus{border-color:var(--color-border-primary)}
.input-row button{padding:8px 18px;font-size:14px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
.input-row button:hover{background:var(--color-background-tertiary)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.stat-value{font-size:18px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.error{font-size:13px;color:var(--color-text-danger);padding:8px 12px;border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);background:var(--color-background-danger);margin-bottom:1rem}
.schemes{display:flex;flex-direction:column;gap:10px}
.scheme-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.scheme-header{display:flex;align-items:baseline;gap:8px;padding:10px 14px 0}
.scheme-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.scheme-desc{font-size:11px;color:var(--color-text-secondary)}
canvas{display:block;width:100%;height:72px}
</style>
<div class="app">
  <div class="header">
    <h2>Line encoding — student ID analyser</h2>
    <p>Enter your student ID to generate all 9 encoding schemes</p>
  </div>
  <div class="input-row">
    <input id="sid" type="text" placeholder="e.g. 242011512" maxlength="20" value="242011512"/>
    <button onclick="run()">Generate</button>
  </div>
  <div id="err" class="error" style="display:none"></div>
  <div id="stats" class="stats" style="display:none">
    <div class="stat"><div class="stat-label">Digit sum</div><div class="stat-value" id="s-sum"></div></div>
    <div class="stat"><div class="stat-label">Binary</div><div class="stat-value" id="s-bin"></div></div>
    <div class="stat"><div class="stat-label">Bits</div><div class="stat-value" id="s-bits"></div></div>
  </div>
  <div id="schemes" class="schemes"></div>
</div>
<script>
const COLORS = {
  unipolar:'#378ADD', nrzi:'#1D9E75', diffman:'#BA7517',
  ami:'#D85A30', mlt3:'#7F77DD', ask:'#534AB7',
  fsk:'#0F6E56', psk:'#D4537E', qpsk:'#639922'
};

function digitSum(s){return s.split('').reduce((a,c)=>a+parseInt(c),0)}
function toBin(n){return n===0?'0':n.toString(2)}

function drawScheme(canvas, bits, scheme) {
  const dpr = window.devicePixelRatio||1;
  const W = canvas.offsetWidth||600;
  const H = 72;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const n = bits.length;
  const bw = (W-60)/n;
  const yH = 14, y0 = 36, yL = 58;
  const color = COLORS[scheme];

  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-border-tertiary')||'rgba(0,0,0,0.1)';
  ctx.lineWidth = 0.5;
  for(let i=0;i<=n;i++){
    const x = 60+i*bw;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]);

  const tx = getComputedStyle(document.documentElement).getPropertyValue('--color-text-tertiary')||'#aaa';
  ctx.fillStyle = tx; ctx.font = '10px sans-serif'; ctx.textAlign='center';
  for(let i=0;i<n;i++){
    ctx.fillText(bits[i], 60+i*bw+bw/2, 10);
  }

  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath();

  if(scheme==='unipolar'){
    ctx.moveTo(60, bits[0]==='1'?yH:y0);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      const cy=bits[i]==='1'?yH:y0;
      ctx.lineTo(x2,cy);
      if(i<n-1){
        const ny=bits[i+1]==='1'?yH:y0;
        if(ny!==cy){ctx.lineTo(x2,cy);ctx.lineTo(x2,ny);}
      }
    }
  }

  else if(scheme==='nrzi'){
    let cur=yL;
    ctx.moveTo(60,cur);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      if(bits[i]==='1'){const ny=cur===yH?yL:yH; ctx.lineTo(x1,cur);ctx.lineTo(x1,ny);cur=ny;}
      ctx.lineTo(x2,cur);
    }
  }

  else if(scheme==='diffman'){
    let cur=yH;
    ctx.moveTo(60,cur);
    for(let i=0;i<n;i++){
      const xs=60+i*bw, xm=xs+bw/2, xe=xs+bw;
      if(bits[i]==='0'){const ny=cur===yH?yL:yH;ctx.lineTo(xs,cur);ctx.lineTo(xs,ny);cur=ny;}
      else{ctx.lineTo(xs,cur);}
      const my=cur===yH?yL:yH;
      ctx.lineTo(xm,cur);ctx.lineTo(xm,my);cur=my;
      ctx.lineTo(xe,cur);
    }
  }

  else if(scheme==='ami'){
    let lastSign=1;
    ctx.moveTo(60,y0);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      if(bits[i]==='0'){ctx.lineTo(x1,y0);ctx.lineTo(x2,y0);}
      else{
        const cy=lastSign===1?yH:yL;
        ctx.lineTo(x1,y0);ctx.lineTo(x1,cy);ctx.lineTo(x2,cy);ctx.lineTo(x2,y0);
        lastSign=-lastSign;
      }
    }
  }

  else if(scheme==='mlt3'){
    const lvls=[yH,y0,yL];
    let idx=1;
    ctx.moveTo(60,lvls[idx]);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      if(bits[i]==='1'){
        idx=(idx+1)%3;
        const ny=lvls[idx];
        ctx.lineTo(x1,lvls[(idx+2)%3]);ctx.lineTo(x1,ny);
      }
      ctx.lineTo(x2,lvls[idx]);
    }
  }

  else if(scheme==='ask'){
    const amp=20, freq=4;
    ctx.moveTo(60,y0);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      if(bits[i]==='0'){ctx.lineTo(x2,y0);}
      else{
        const steps=40;
        for(let s=0;s<=steps;s++){
          const t=s/steps; const x=x1+t*(x2-x1);
          const y=y0-amp*Math.sin(2*Math.PI*freq*t);
          ctx.lineTo(x,y);
        }
      }
    }
  }

  else if(scheme==='fsk'){
    const amp=18;
    ctx.moveTo(60,y0);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      const freq=bits[i]==='1'?6:2.5;
      const steps=60;
      for(let s=0;s<=steps;s++){
        const t=s/steps; const x=x1+t*(x2-x1);
        const y=y0-amp*Math.sin(2*Math.PI*freq*t);
        ctx.lineTo(x,y);
      }
    }
  }

  else if(scheme==='psk'){
    const amp=18,freq=3;
    ctx.moveTo(60,y0);
    for(let i=0;i<n;i++){
      const x1=60+i*bw, x2=60+(i+1)*bw;
      const phase=bits[i]==='1'?0:Math.PI;
      const steps=50;
      for(let s=0;s<=steps;s++){
        const t=s/steps; const x=x1+t*(x2-x1);
        const y=y0-amp*Math.sin(2*Math.PI*freq*t+phase);
        ctx.lineTo(x,y);
      }
    }
  }

  else if(scheme==='qpsk'){
    const amp=18;
    const phases={'00':Math.PI/4,'01':3*Math.PI/4,'10':5*Math.PI/4,'11':7*Math.PI/4};
    const padded=n%2===1?bits+'0':bits;
    ctx.moveTo(60,y0);
    const dibits=Math.ceil(n/2);
    for(let i=0;i<dibits;i++){
      const db=padded.slice(i*2,i*2+2);
      const phase=phases[db]||0;
      const x1=60+i*2*bw, x2=Math.min(60+(i*2+2)*bw,60+n*bw);
      const steps=60;
      for(let s=0;s<=steps;s++){
        const t=s/steps; const x=x1+t*(x2-x1);
        const y=y0-amp*Math.sin(2*Math.PI*3*t+phase);
        ctx.lineTo(x,y);
      }
    }
  }

  ctx.stroke();

  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--color-border-secondary')||'rgba(0,0,0,0.2)';
  ctx.lineWidth=0.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(60,y0); ctx.lineTo(W,y0); ctx.stroke();
}

const SCHEMES=[
  {id:'unipolar',name:'Unipolar NRZ',desc:'1 = +V, 0 = 0V'},
  {id:'nrzi',name:'NRZ-I',desc:'1 = transition, 0 = no change'},
  {id:'diffman',name:'Differential Manchester',desc:'mid-bit transition always; 0 = extra start transition'},
  {id:'ami',name:'AMI (bipolar)',desc:'0 = 0V; 1 = alternating ±V'},
  {id:'mlt3',name:'MLT-3',desc:'1 = advance level cycle (+V→0→−V→0); 0 = hold'},
  {id:'ask',name:'ASK',desc:'1 = carrier present; 0 = silence'},
  {id:'fsk',name:'FSK',desc:'1 = high frequency; 0 = low frequency'},
  {id:'psk',name:'PSK (BPSK)',desc:'1 = 0° phase; 0 = 180° phase'},
  {id:'qpsk',name:'QPSK',desc:'encodes 2 bits per symbol (dibits)'},
];

const canvases={};

function run(){
  const raw=document.getElementById('sid').value.trim();
  const err=document.getElementById('err');
  if(!/^\d+$/.test(raw)||raw.length===0){
    err.textContent='Please enter a valid numeric student ID.';
    err.style.display='block';
    document.getElementById('stats').style.display='none';
    document.getElementById('schemes').innerHTML='';
    return;
  }
  err.style.display='none';
  const sum=digitSum(raw);
  const bin=toBin(sum);
  document.getElementById('s-sum').textContent=raw.split('').join('+')+'='+sum;
  document.getElementById('s-bin').textContent=bin;
  document.getElementById('s-bits').textContent=bin.length;
  document.getElementById('stats').style.display='grid';

  const cont=document.getElementById('schemes');
  cont.innerHTML='';
  SCHEMES.forEach(sc=>{
    const card=document.createElement('div');
    card.className='scheme-card';
    card.innerHTML=`<div class="scheme-header"><span class="scheme-name">${sc.name}</span><span class="scheme-desc">${sc.desc}</span></div>`;
    const cvs=document.createElement('canvas');
    cvs.style.height='72px';
    card.appendChild(cvs);
    cont.appendChild(card);
    canvases[sc.id]=cvs;
  });

  requestAnimationFrame(()=>{
    SCHEMES.forEach(sc=>drawScheme(canvases[sc.id],bin,sc.id));
  });
}

window.addEventListener('resize',()=>{
  const bin=document.getElementById('s-bin').textContent;
  if(!bin)return;
  SCHEMES.forEach(sc=>{
    if(canvases[sc.id])drawScheme(canvases[sc.id],bin,sc.id);
  });
});

run();
</script>
