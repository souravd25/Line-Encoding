<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student ID Line Encoder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeecea;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9a9891;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.20);
    --accent: #378ADD;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2c;
      --text: #e8e6df;
      --text2: #a8a69f;
      --text3: #6a6864;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.16);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }

  .input-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .input-row input {
    flex: 1; font-size: 15px; padding: 9px 13px;
    border: 0.5px solid var(--border2); border-radius: 8px;
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button {
    padding: 9px 22px; font-size: 14px; font-weight: 500;
    border: 0.5px solid var(--border2); border-radius: 8px;
    background: var(--bg2); color: var(--text); cursor: pointer;
    transition: background 0.15s;
  }
  .input-row button:hover { background: var(--bg3); }
  .input-row button:active { transform: scale(0.98); }

  .error {
    font-size: 13px; color: #c0392b; padding: 9px 13px;
    border: 0.5px solid #e74c3c; border-radius: 8px;
    background: #fdf0ef; margin-bottom: 1rem; display: none;
  }
  @media (prefers-color-scheme: dark) {
    .error { background: #3a1a18; color: #f1948a; border-color: #922b21; }
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 8px; margin-bottom: 1rem;
  }
  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }

  .stat { background: var(--bg2); border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 500; font-family: monospace; word-break: break-all; color: var(--text); }
  .stat-value.hi { color: var(--accent); font-size: 20px; }

  .note {
    font-size: 13px; color: var(--text2);
    background: var(--bg2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 9px 14px;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }
  .note strong { color: var(--text); font-weight: 500; }

  .schemes { display: flex; flex-direction: column; gap: 10px; }

  .scheme-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .scheme-header {
    display: flex; align-items: baseline; gap: 8px;
    padding: 10px 14px 2px; flex-wrap: wrap;
  }
  .scheme-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .scheme-desc { font-size: 11px; color: var(--text2); }
  .qpsk-note { font-size: 11px; color: var(--text3); padding: 2px 14px 6px; font-family: monospace; }

  canvas { display: block; width: 100%; height: 78px; }

  footer {
    margin-top: 2rem; text-align: center;
    font-size: 12px; color: var(--text3);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Line encoding — student ID analyser</h1>
  <p class="subtitle">Enter your student ID — natural binary used for all schemes; QPSK zero-padded to 6 bits</p>

  <div class="input-row">
    <input id="sid" type="text" placeholder="e.g. 242011512" maxlength="20"/>
    <button onclick="run()">Generate</button>
  </div>

  <div id="err" class="error"></div>

  <div id="stats" class="stats" style="display:none">
    <div class="stat"><div class="stat-label">Student ID</div><div class="stat-value" id="s-id"></div></div>
    <div class="stat"><div class="stat-label">Digit sum</div><div class="stat-value" id="s-sum"></div></div>
    <div class="stat"><div class="stat-label">Binary (all schemes)</div><div class="stat-value hi" id="s-bin"></div></div>
  </div>

  <div id="note" class="note" style="display:none"></div>

  <div id="schemes" class="schemes"></div>

  <footer id="footer"></footer>
</div>

<script>
const COLORS = {
  unipolar:'#378ADD', nrzi:'#1D9E75', diffman:'#BA7517',
  ami:'#D85A30', mlt3:'#7F77DD', ask:'#534AB7',
  fsk:'#0F6E56', psk:'#D4537E', qpsk:'#639922'
};

const SCHEMES = [
  { id:'unipolar', name:'Unipolar NRZ',           desc:'1 = +V,  0 = 0V' },
  { id:'nrzi',     name:'NRZ-I',                  desc:'1 = transition at bit start,  0 = no change' },
  { id:'diffman',  name:'Differential Manchester', desc:'always mid-bit transition;  0 = extra transition at start' },
  { id:'ami',      name:'AMI (bipolar)',            desc:'0 = 0V;  1 = alternating +V / −V' },
  { id:'mlt3',     name:'MLT-3',                   desc:'1 = advance level cycle (+V→0→−V→0);  0 = hold' },
  { id:'ask',      name:'ASK',                     desc:'1 = carrier wave present;  0 = silence (0V)' },
  { id:'fsk',      name:'FSK',                     desc:'1 = high frequency carrier;  0 = low frequency carrier' },
  { id:'psk',      name:'PSK (BPSK)',              desc:'1 = 0° phase;  0 = 180° (inverted) phase' },
  { id:'qpsk',     name:'QPSK',                    desc:'2 bits per symbol — zero-padded to 6 bits for 3 clean dibits' },
];

function digitSum(s) { return s.split('').reduce((a,c) => a + parseInt(c), 0); }

function toNaturalBin(n) { return n === 0 ? '0' : n.toString(2); }

function to6bit(bin) {
  if (bin.length >= 6) return bin.slice(-6);
  return bin.padStart(6, '0');
}

function qpskDibits(bits6) {
  const phases = { '00':'45°', '01':'135°', '10':'225°', '11':'315°' };
  const result = [];
  for (let i = 0; i < 3; i++) {
    const db = bits6.slice(i*2, i*2+2);
    result.push(db + '→' + (phases[db] || '?'));
  }
  return result.join('  |  ');
}

function draw(canvas, bits, scheme) {
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth || 680;
  const H   = 78;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const n  = bits.length;
  const bw = (W - 68) / n;
  const yH = 14, y0 = 39, yL = 64;

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridC  = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  const axisC  = isDark ? 'rgba(255,255,255,0.14)' : 'rgba(0,0,0,0.14)';
  const lblC   = isDark ? '#6a6864' : '#b0aea8';

  for (let i = 0; i <= n; i++) {
    const x = 68 + i * bw;
    ctx.strokeStyle = gridC; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = lblC; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) ctx.fillText(bits[i], 68 + i*bw + bw/2, 11);

  ctx.strokeStyle = axisC; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(68,y0); ctx.lineTo(W,y0); ctx.stroke();

  ctx.strokeStyle = COLORS[scheme];
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.setLineDash([]);
  ctx.beginPath();

  if (scheme === 'unipolar') {
    let cy = bits[0]==='1' ? yH : y0;
    ctx.moveTo(68, cy);
    for (let i = 0; i < n; i++) {
      const x2 = 68+(i+1)*bw;
      cy = bits[i]==='1' ? yH : y0;
      ctx.lineTo(x2, cy);
      if (i < n-1) {
        const ny = bits[i+1]==='1' ? yH : y0;
        if (ny !== cy) { ctx.lineTo(x2,cy); ctx.lineTo(x2,ny); }
      }
    }
  }

  else if (scheme === 'nrzi') {
    let cur = yL; ctx.moveTo(68, cur);
    for (let i = 0; i < n; i++) {
      const x1=68+i*bw, x2=68+(i+1)*bw;
      if (bits[i]==='1') { const ny=cur===yH?yL:yH; ctx.lineTo(x1,cur); ctx.lineTo(x1,ny); cur=ny; }
      ctx.lineTo(x2, cur);
    }
  }

  else if (scheme === 'diffman') {
    let cur = yH; ctx.moveTo(68, cur);
    for (let i = 0; i < n; i++) {
      const xs=68+i*bw, xm=xs+bw/2, xe=xs+bw;
      if (bits[i]==='0') { const ny=cur===yH?yL:yH; ctx.lineTo(xs,cur); ctx.lineTo(xs,ny); cur=ny; }
      else { ctx.lineTo(xs,cur); }
      const my=cur===yH?yL:yH; ctx.lineTo(xm,cur); ctx.lineTo(xm,my); cur=my; ctx.lineTo(xe,cur);
    }
  }

  else if (scheme === 'ami') {
    let sign=1; ctx.moveTo(68, y0);
    for (let i = 0; i < n; i++) {
      const x1=68+i*bw, x2=68+(i+1)*bw;
      if (bits[i]==='0') { ctx.lineTo(x2,y0); }
      else {
        const cy=sign===1?yH:yL;
        ctx.lineTo(x1,y0); ctx.lineTo(x1,cy); ctx.lineTo(x2,cy); ctx.lineTo(x2,y0);
        sign=-sign;
      }
    }
  }

  else if (scheme === 'mlt3') {
    const lvls=[yH,y0,yL]; let idx=1; ctx.moveTo(68, lvls[idx]);
    for (let i = 0; i < n; i++) {
      const x1=68+i*bw, x2=68+(i+1)*bw;
      if (bits[i]==='1') { const p=lvls[idx]; idx=(idx+1)%3; ctx.lineTo(x1,p); ctx.lineTo(x1,lvls[idx]); }
      ctx.lineTo(x2, lvls[idx]);
    }
  }

  else if (scheme === 'ask') {
    ctx.moveTo(68, y0);
    for (let i = 0; i < n; i++) {
      const x1=68+i*bw, x2=68+(i+1)*bw;
      if (bits[i]==='0') { ctx.lineTo(x2,y0); }
      else { for(let s=0;s<=60;s++){const t=s/60; ctx.lineTo(x1+t*(x2-x1), y0-20*Math.sin(2*Math.PI*4*t));} }
    }
  }

  else if (scheme === 'fsk') {
    ctx.moveTo(68, y0);
    for (let i = 0; i < n; i++) {
      const x1=68+i*bw, x2=68+(i+1)*bw, f=bits[i]==='1'?6:2.5;
      for(let s=0;s<=60;s++){const t=s/60; ctx.lineTo(x1+t*(x2-x1), y0-20*Math.sin(2*Math.PI*f*t));}
    }
  }

  else if (scheme === 'psk') {
    ctx.moveTo(68, y0);
    for (let i = 0; i < n; i++) {
      const x1=68+i*bw, x2=68+(i+1)*bw, ph=bits[i]==='1'?0:Math.PI;
      for(let s=0;s<=60;s++){const t=s/60; ctx.lineTo(x1+t*(x2-x1), y0-20*Math.sin(2*Math.PI*3*t+ph));}
    }
  }

  else if (scheme === 'qpsk') {
    const phases={'00':Math.PI/4,'01':3*Math.PI/4,'10':5*Math.PI/4,'11':7*Math.PI/4};
    ctx.moveTo(68, y0);
    for (let i = 0; i < 3; i++) {
      const db=bits.slice(i*2,i*2+2), ph=phases[db]||0;
      const x1=68+i*2*bw, x2=68+(i*2+2)*bw;
      for(let s=0;s<=60;s++){const t=s/60; ctx.lineTo(x1+t*(x2-x1), y0-20*Math.sin(2*Math.PI*3*t+ph));}
    }
  }

  ctx.stroke();
}

const canvases = {};

function run() {
  const raw = document.getElementById('sid').value.trim();
  const err = document.getElementById('err');

  if (!/^\d+$/.test(raw) || raw.length === 0) {
    err.textContent = 'Please enter a valid numeric student ID (digits only).';
    err.style.display = 'block';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('note').style.display  = 'none';
    document.getElementById('schemes').innerHTML   = '';
    document.getElementById('footer').textContent  = '';
    return;
  }
  err.style.display = 'none';

  const sum    = digitSum(raw);
  const natBin = toNaturalBin(sum);
  const bin6   = to6bit(natBin);   // used only for QPSK

  document.getElementById('s-id').textContent  = raw;
  document.getElementById('s-sum').textContent = raw.split('').join('+') + ' = ' + sum;
  document.getElementById('s-bin').textContent = natBin;
  document.getElementById('stats').style.display = 'grid';

  const noteEl = document.getElementById('note');
  if (natBin.length < 6) {
    noteEl.innerHTML =
      'Binary is <strong>' + natBin + '</strong> (' + natBin.length + ' bits) — used as-is for all schemes except QPSK, ' +
      'which is zero-padded to 6 bits: <strong>' + bin6 + '</strong>';
  } else {
    noteEl.innerHTML =
      'Binary is <strong>' + natBin + '</strong> (' + natBin.length + ' bits) — used for all schemes. ' +
      'QPSK uses the last 6 bits: <strong>' + bin6 + '</strong>';
  }
  noteEl.style.display = 'block';

  const cont = document.getElementById('schemes');
  cont.innerHTML = '';

  SCHEMES.forEach(sc => {
    // QPSK always uses 6-bit version; all others use natural binary
    const bits = sc.id === 'qpsk' ? bin6 : natBin;

    const card = document.createElement('div');
    card.className = 'scheme-card';
    card.innerHTML = `<div class="scheme-header">
      <span class="scheme-name">${sc.name}</span>
      <span class="scheme-desc">${sc.desc}</span>
    </div>`;

    if (sc.id === 'qpsk') {
      const qn = document.createElement('div');
      qn.className = 'qpsk-note';
      qn.textContent = '6-bit input: ' + bin6 + '   |   Dibits: ' + qpskDibits(bin6);
      card.appendChild(qn);
    }

    const c = document.createElement('canvas');
    card.appendChild(c);
    cont.appendChild(card);
    canvases[sc.id] = { el: c, bits };
  });

  requestAnimationFrame(() =>
    SCHEMES.forEach(sc => draw(canvases[sc.id].el, canvases[sc.id].bits, sc.id))
  );

  document.getElementById('footer').textContent =
    'ID: ' + raw + '  |  Digit sum: ' + sum + '  |  Binary: ' + natBin + '  |  QPSK 6-bit: ' + bin6;
}

window.addEventListener('resize', () => {
  SCHEMES.forEach(sc => {
    if (canvases[sc.id]) draw(canvases[sc.id].el, canvases[sc.id].bits, sc.id);
  });
});

document.getElementById('sid').addEventListener('keydown', e => { if (e.key==='Enter') run(); });
</script>
</body>
</html>
