<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student ID Line Encoder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeecea;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9a9891;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --accent: #378ADD;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2c;
      --text: #e8e6df;
      --text2: #a8a69f;
      --text3: #6a6864;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 700px; margin: 0 auto; }

  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }

  .input-row {
    display: flex; gap: 10px; margin-bottom: 1rem;
  }
  .input-row input {
    flex: 1; font-size: 15px; padding: 9px 13px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button {
    padding: 9px 20px; font-size: 14px; font-weight: 500;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); cursor: pointer;
    transition: background 0.15s;
  }
  .input-row button:hover { background: var(--bg3); }
  .input-row button:active { transform: scale(0.98); }

  .error {
    font-size: 13px; color: #c0392b; padding: 8px 13px;
    border: 0.5px solid #e74c3c; border-radius: var(--radius);
    background: #fdf0ef; margin-bottom: 1rem; display: none;
  }
  @media (prefers-color-scheme: dark) {
    .error { background: #3a1a18; color: #f1948a; border-color: #922b21; }
  }

  .stats {
    display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 8px; margin-bottom: 1.5rem; display: none;
  }
  .stat {
    background: var(--bg2); border-radius: var(--radius); padding: 10px 13px;
  }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .stat-value { font-size: 16px; font-weight: 500; font-family: monospace; word-break: break-all; }

  .schemes { display: flex; flex-direction: column; gap: 10px; }

  .scheme-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .scheme-header {
    display: flex; align-items: baseline; gap: 8px;
    padding: 10px 14px 4px;
  }
  .scheme-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .scheme-desc { font-size: 11px; color: var(--text2); }
  canvas { display: block; width: 100%; height: 72px; }

  footer {
    margin-top: 2rem; text-align: center;
    font-size: 12px; color: var(--text3);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Line encoding — student ID analyser</h1>
  <p class="subtitle">Enter your student ID to generate all 9 encoding schemes</p>

  <div class="input-row">
    <input id="sid" type="text" placeholder="e.g. 242011512" maxlength="20" value=""/>
    <button onclick="run()">Generate</button>
  </div>

  <div id="err" class="error"></div>

  <div id="stats" class="stats">
    <div class="stat">
      <div class="stat-label">Digit sum</div>
      <div class="stat-value" id="s-sum"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Binary</div>
      <div class="stat-value" id="s-bin"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Bits</div>
      <div class="stat-value" id="s-bits"></div>
    </div>
  </div>

  <div id="schemes" class="schemes"></div>

  <footer>Built for data communications students &mdash; works offline</footer>
</div>

<script>
const COLORS = {
  unipolar:'#378ADD', nrzi:'#1D9E75', diffman:'#BA7517',
  ami:'#D85A30', mlt3:'#7F77DD', ask:'#534AB7',
  fsk:'#0F6E56', psk:'#D4537E', qpsk:'#639922'
};

const SCHEMES = [
  {id:'unipolar', name:'Unipolar NRZ',          desc:'1 = +V, 0 = 0V'},
  {id:'nrzi',    name:'NRZ-I',                  desc:'1 = transition, 0 = no change'},
  {id:'diffman', name:'Differential Manchester', desc:'mid-bit transition always; 0 = extra start transition'},
  {id:'ami',     name:'AMI (bipolar)',           desc:'0 = 0V; 1 = alternating ±V'},
  {id:'mlt3',    name:'MLT-3',                  desc:'1 = advance level cycle (+V→0→−V→0); 0 = hold'},
  {id:'ask',     name:'ASK',                    desc:'1 = carrier present; 0 = silence'},
  {id:'fsk',     name:'FSK',                    desc:'1 = high frequency; 0 = low frequency'},
  {id:'psk',     name:'PSK (BPSK)',             desc:'1 = 0° phase; 0 = 180° phase'},
  {id:'qpsk',    name:'QPSK',                   desc:'encodes 2 bits per symbol (dibits)'},
];

function digitSum(s){ return s.split('').reduce((a,c)=>a+parseInt(c),0); }
function toBin(n){ return n===0?'0':n.toString(2); }

function drawScheme(canvas, bits, scheme) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 640;
  const H = 72;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const n  = bits.length;
  const bw = (W - 60) / n;
  const yH = 14, y0 = 36, yL = 58;

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor  = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
  const axisColor  = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
  const labelColor = isDark ? '#6a6864' : '#aaa';

  /* grid lines */
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= n; i++) {
    const x = 60 + i * bw;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.setLineDash([]);

  /* bit labels */
  ctx.fillStyle = labelColor;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    ctx.fillText(bits[i], 60 + i * bw + bw / 2, 10);
  }

  /* zero axis */
  ctx.strokeStyle = axisColor;
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(60, y0); ctx.lineTo(W, y0); ctx.stroke();

  /* signal */
  ctx.strokeStyle = COLORS[scheme];
  ctx.lineWidth = 2;
  ctx.beginPath();

  if (scheme === 'unipolar') {
    ctx.moveTo(60, bits[0]==='1' ? yH : y0);
    for (let i = 0; i < n; i++) {
      const x2 = 60 + (i+1) * bw;
      const cy = bits[i]==='1' ? yH : y0;
      ctx.lineTo(x2, cy);
      if (i < n-1) {
        const ny = bits[i+1]==='1' ? yH : y0;
        if (ny !== cy) { ctx.lineTo(x2, cy); ctx.lineTo(x2, ny); }
      }
    }
  }

  else if (scheme === 'nrzi') {
    let cur = yL;
    ctx.moveTo(60, cur);
    for (let i = 0; i < n; i++) {
      const x1 = 60 + i*bw, x2 = 60 + (i+1)*bw;
      if (bits[i]==='1') {
        const ny = cur===yH ? yL : yH;
        ctx.lineTo(x1, cur); ctx.lineTo(x1, ny); cur = ny;
      }
      ctx.lineTo(x2, cur);
    }
  }

  else if (scheme === 'diffman') {
    let cur = yH;
    ctx.moveTo(60, cur);
    for (let i = 0; i < n; i++) {
      const xs = 60+i*bw, xm = xs+bw/2, xe = xs+bw;
      if (bits[i]==='0') {
        const ny = cur===yH ? yL : yH;
        ctx.lineTo(xs, cur); ctx.lineTo(xs, ny); cur = ny;
      } else {
        ctx.lineTo(xs, cur);
      }
      const my = cur===yH ? yL : yH;
      ctx.lineTo(xm, cur); ctx.lineTo(xm, my); cur = my;
      ctx.lineTo(xe, cur);
    }
  }

  else if (scheme === 'ami') {
    let lastSign = 1;
    ctx.moveTo(60, y0);
    for (let i = 0; i < n; i++) {
      const x1 = 60+i*bw, x2 = 60+(i+1)*bw;
      if (bits[i]==='0') {
        ctx.lineTo(x2, y0);
      } else {
        const cy = lastSign===1 ? yH : yL;
        ctx.lineTo(x1, y0); ctx.lineTo(x1, cy);
        ctx.lineTo(x2, cy); ctx.lineTo(x2, y0);
        lastSign = -lastSign;
      }
    }
  }

  else if (scheme === 'mlt3') {
    const lvls = [yH, y0, yL];
    let idx = 1;
    ctx.moveTo(60, lvls[idx]);
    for (let i = 0; i < n; i++) {
      const x1 = 60+i*bw, x2 = 60+(i+1)*bw;
      if (bits[i]==='1') {
        const prev = lvls[idx];
        idx = (idx+1) % 3;
        ctx.lineTo(x1, prev); ctx.lineTo(x1, lvls[idx]);
      }
      ctx.lineTo(x2, lvls[idx]);
    }
  }

  else if (scheme === 'ask') {
    const amp = 18, freq = 4;
    ctx.moveTo(60, y0);
    for (let i = 0; i < n; i++) {
      const x1 = 60+i*bw, x2 = 60+(i+1)*bw;
      if (bits[i]==='0') {
        ctx.lineTo(x2, y0);
      } else {
        for (let s = 0; s <= 50; s++) {
          const t = s/50;
          ctx.lineTo(x1+t*(x2-x1), y0 - amp*Math.sin(2*Math.PI*freq*t));
        }
      }
    }
  }

  else if (scheme === 'fsk') {
    const amp = 18;
    ctx.moveTo(60, y0);
    for (let i = 0; i < n; i++) {
      const x1 = 60+i*bw, x2 = 60+(i+1)*bw;
      const freq = bits[i]==='1' ? 6 : 2.5;
      for (let s = 0; s <= 60; s++) {
        const t = s/60;
        ctx.lineTo(x1+t*(x2-x1), y0 - amp*Math.sin(2*Math.PI*freq*t));
      }
    }
  }

  else if (scheme === 'psk') {
    const amp = 18, freq = 3;
    ctx.moveTo(60, y0);
    for (let i = 0; i < n; i++) {
      const x1 = 60+i*bw, x2 = 60+(i+1)*bw;
      const phase = bits[i]==='1' ? 0 : Math.PI;
      for (let s = 0; s <= 50; s++) {
        const t = s/50;
        ctx.lineTo(x1+t*(x2-x1), y0 - amp*Math.sin(2*Math.PI*freq*t + phase));
      }
    }
  }

  else if (scheme === 'qpsk') {
    const amp = 18;
    const phases = {'00':Math.PI/4,'01':3*Math.PI/4,'10':5*Math.PI/4,'11':7*Math.PI/4};
    const padded = bits.length%2===1 ? bits+'0' : bits;
    ctx.moveTo(60, y0);
    const dibits = Math.ceil(bits.length/2);
    for (let i = 0; i < dibits; i++) {
      const db = padded.slice(i*2, i*2+2);
      const phase = phases[db] || 0;
      const x1 = 60+i*2*bw, x2 = Math.min(60+(i*2+2)*bw, 60+bits.length*bw);
      for (let s = 0; s <= 60; s++) {
        const t = s/60;
        ctx.lineTo(x1+t*(x2-x1), y0 - amp*Math.sin(2*Math.PI*3*t + phase));
      }
    }
  }

  ctx.stroke();
}

const canvases = {};

function run() {
  const raw = document.getElementById('sid').value.trim();
  const err = document.getElementById('err');

  if (!/^\d+$/.test(raw) || raw.length === 0) {
    err.textContent = 'Please enter a valid numeric student ID.';
    err.style.display = 'block';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('schemes').innerHTML = '';
    return;
  }
  err.style.display = 'none';

  const sum = digitSum(raw);
  const bin = toBin(sum);

  document.getElementById('s-sum').textContent = raw.split('').join('+') + ' = ' + sum;
  document.getElementById('s-bin').textContent = bin;
  document.getElementById('s-bits').textContent = bin.length + ' bits';
  document.getElementById('stats').style.display = 'grid';

  const cont = document.getElementById('schemes');
  cont.innerHTML = '';
  SCHEMES.forEach(sc => {
    const card = document.createElement('div');
    card.className = 'scheme-card';
    card.innerHTML = `<div class="scheme-header">
      <span class="scheme-name">${sc.name}</span>
      <span class="scheme-desc">${sc.desc}</span>
    </div>`;
    const cvs = document.createElement('canvas');
    card.appendChild(cvs);
    cont.appendChild(card);
    canvases[sc.id] = cvs;
  });

  requestAnimationFrame(() => {
    SCHEMES.forEach(sc => drawScheme(canvases[sc.id], bin, sc.id));
  });
}

window.addEventListener('resize', () => {
  const bin = document.getElementById('s-bin').textContent;
  if (!bin) return;
  SCHEMES.forEach(sc => {
    if (canvases[sc.id]) drawScheme(canvases[sc.id], bin, sc.id);
  });
});

document.getElementById('sid').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});
</script>
</body>
</html>
